name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Inject version from git tag into FyneApp.toml
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # Bump Build number using the commit count so every release is unique.
          BUILD=$(git rev-list --count HEAD)
          sed -i -E "s/^Version = \".*\"/Version = \"${VERSION}\"/" FyneApp.toml
          sed -i -E "s/^Build = .*/Build = ${BUILD}/" FyneApp.toml
          echo "--- FyneApp.toml after injection ---"
          cat FyneApp.toml

      - name: Build Windows binary
        # fyne-cross refuses --release when cross-compiling from Linux.
        # Debug symbols are stripped by default; we add -H=windowsgui so the
        # .exe doesn't spawn a console window. --env GOTOOLCHAIN=auto lets Go
        # download the toolchain declared in go.mod when the Docker image
        # ships an older one.
        run: fyne-cross windows -arch=amd64 --app-id com.csstatstracker.app --ldflags "-H=windowsgui" --env GOTOOLCHAIN=auto ./cmd/

      - name: Prepare Windows artifact
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p dist
          # fyne-cross creates a zip directly, rename it
          mv "fyne-cross/dist/windows-amd64/CS Stats Tracker.exe.zip" "dist/csstatstracker_${VERSION}_windows_amd64.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.zip

  release:
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            xorg-dev \
            libasound2-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: extra-artifacts/

      - name: Upload Windows artifact to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for file in extra-artifacts/*.zip; do
            gh release upload "${GITHUB_REF#refs/tags/}" "$file" --clobber
          done
